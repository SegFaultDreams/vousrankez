<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nina P.Bels — Blandine PUJOLS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Nunito:wght@300;400;600&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #ffffff;
      --ink: #1c1c1e;
      --ink-soft: #5a5a6e;
      --rose: #c2185b;
      --book-blue: #1565c0;
      --border: #e0e0e8;
      --shadow: rgba(0, 0, 0, 0.08);
      --shadow-hover: rgba(0, 0, 0, 0.16);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 44px 20px 72px;
    }

    .container {
      width: 100%;
      max-width: 390px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ─── Animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatPhoto {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    .anim { opacity: 0; animation: fadeUp 0.65s ease forwards; }
    .anim:nth-child(1) { animation-delay: 0.05s; }
    .anim:nth-child(2) { animation-delay: 0.18s; }
    .anim:nth-child(3) { animation-delay: 0.30s; }
    .anim:nth-child(4) { animation-delay: 0.42s; }
    .anim:nth-child(5) { animation-delay: 0.52s; }
    .anim:nth-child(6) { animation-delay: 0.62s; }
    .anim:nth-child(7) { animation-delay: 0.72s; }

    /* ─── Profile photo ─── */
    .profile-wrap {
      margin-bottom: 22px;
    }

    .profile-ring {
      width: 136px;
      height: 136px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #e8c8d8 0%, #c9a0c0 50%, #e8c8d8 100%);
      box-shadow: 0 6px 24px var(--shadow);
      animation: floatPhoto 5s ease-in-out infinite 1s;
    }

    .profile-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      background: #f5f0f5;
    }

    /* ─── Name block ─── */
    .name-block {
      text-align: center;
      margin-bottom: 12px;
    }

    .author-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.1rem;
      font-weight: 900;
      color: var(--ink);
      letter-spacing: 0.01em;
      line-height: 1.15;
    }

    .pseudo {
      margin-top: 7px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--ink-soft);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ─── Ornament divider ─── */
    .ornament {
      margin: 4px 0 18px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #c9a0c0;
    }

    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #c9a0c0);
    }

    .ornament-line.right {
      background: linear-gradient(to left, transparent, #c9a0c0);
    }

    /* ─── Welcome text ─── */
    .welcome-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.7;
      color: var(--rose);
      text-align: center;
      padding: 0 8px;
      margin-bottom: 22px;
    }

    /* ─── TikTok icon ─── */
    .tiktok-wrap {
      margin-bottom: 24px;
    }

    .tiktok-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--ink);
      color: #ffffff;
      text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .tiktok-link:hover {
      transform: scale(1.1);
      opacity: 0.85;
    }

    /* ─── Book cards ─── */
    .books {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 22px;
    }

    .book-card {
      width: 100%;
      display: flex;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      height: 96px;
      box-shadow: 0 2px 12px var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .book-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px var(--shadow-hover);
    }

    .book-cover {
      width: 40%;
      flex-shrink: 0;
      overflow: hidden;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 0.4s ease;
    }

    .book-card:hover .book-cover img {
      transform: scale(1.06);
    }

    .book-info {
      flex: 1;
      background: linear-gradient(135deg, var(--book-blue) 0%, #1976d2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
    }

    .book-info::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .book-card:hover .book-info::after {
      transform: translateX(100%);
    }

    .book-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.04em;
      line-height: 1.4;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* ─── Website buttons ─── */
    .website-links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .website-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      padding: 14px 22px;
      text-decoration: none;
      border-radius: 10px;
      background: #ffffff;
      border: 1.5px solid var(--border);
      color: var(--ink);
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      box-shadow: 0 1px 6px var(--shadow);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .website-btn:hover {
      border-color: var(--ink);
      background: #f8f8fb;
      box-shadow: 0 4px 16px var(--shadow-hover);
      transform: translateY(-2px);
    }

    .website-btn svg {
      color: var(--ink-soft);
      flex-shrink: 0;
    }

    @media (max-width: 360px) {
      .author-name { font-size: 1.8rem; }
      .book-title   { font-size: 0.75rem; }
    }
  </style>
</head>
